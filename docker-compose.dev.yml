services:
  postgres:
    image: postgres:16-alpine
    container_name: enigma-dev-postgres
    environment:
      POSTGRES_DB: enigma_dev
      POSTGRES_USER: enigma
      POSTGRES_PASSWORD: enigma_dev
    ports:
      - "5433:5432"
    volumes:
      - dev-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enigma"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: enigma-dev-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: enigma-dev-server
    ports:
      - "8090:8080"
    environment:
      DATABASE_URL: postgres://enigma:enigma_dev@postgres:5432/enigma_dev?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dev-postgres-data:
