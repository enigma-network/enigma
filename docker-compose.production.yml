services:
  server:
    image: ghcr.io/vbeinlich/enigma-server:latest
    ports:
      - "8080:8080"
    volumes:
      - server-data:/data
    restart: unless-stopped

  web:
    image: ghcr.io/vbeinlich/enigma-web:latest
    ports:
      - "3000:3000"
    volumes:
      - web-data:/data
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-}
      - DATABASE_URL=file:/data/web.db
      - ENIGMA_SERVER_URL=http://server:8080
      - ENIGMA_LOG_PATH=/data/enigma.log
      - ENIGMA_ADMIN_TOKEN=${ENIGMA_ADMIN_TOKEN:-}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server-data:
  web-data:
